<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 375">
  <rect width="1200" height="375" fill="#eae4dc"/>

  <!-- 上下雙細線 -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
  <line x1="40" y1="68" x2="1160" y2="68" stroke="#a68b6b" stroke-width="0.3" opacity="0.4"/>
  <line x1="40" y1="307" x2="1160" y2="307" stroke="#a68b6b" stroke-width="0.3" opacity="0.4"/>

  <!-- ★ 四角 Art Deco 角飾 ★ -->
  <g stroke="#a68b6b" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 30 30 L 30 60 M 30 30 L 60 30"/>
    <path d="M 35 35 Q 50 35 50 50 Q 50 35 65 35" stroke-width="0.7"/>
    <circle cx="30" cy="30" r="2.5" fill="#a68b6b" stroke="none" opacity="0.9"/>
  </g>
  <g stroke="#a68b6b" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 1170 30 L 1170 60 M 1170 30 L 1140 30"/>
    <path d="M 1165 35 Q 1150 35 1150 50 Q 1150 35 1135 35" stroke-width="0.7"/>
    <circle cx="1170" cy="30" r="2.5" fill="#a68b6b" stroke="none" opacity="0.9"/>
  </g>
  <g stroke="#a68b6b" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 30 345 L 30 315 M 30 345 L 60 345"/>
    <path d="M 35 340 Q 50 340 50 325 Q 50 340 65 340" stroke-width="0.7"/>
    <circle cx="30" cy="345" r="2.5" fill="#a68b6b" stroke="none" opacity="0.9"/>
  </g>
  <g stroke="#a68b6b" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 1170 345 L 1170 315 M 1170 345 L 1140 345"/>
    <path d="M 1165 340 Q 1150 340 1150 325 Q 1150 340 1135 340" stroke-width="0.7"/>
    <circle cx="1170" cy="345" r="2.5" fill="#a68b6b" stroke="none" opacity="0.9"/>
  </g>

  <!-- ★ 頂部中央 ornament star ★ -->
  <g transform="translate(600,52)" fill="#a68b6b" opacity="0.7">
    <circle r="2"/>
    <circle cx="-15" r="1.2"/>
    <circle cx="15"  r="1.2"/>
    <circle cx="-30" r="0.8" opacity="0.5"/>
    <circle cx="30"  r="0.8" opacity="0.5"/>
  </g>

  <!-- 右側三層金圓(由淡到濃,呼吸感) -->
  <circle cx="1080" cy="187" r="180" fill="#c4a882" opacity="0.12"/>
  <circle cx="1080" cy="187" r="120" fill="#c4a882" opacity="0.20"/>
  <circle cx="1080" cy="187"  r="60" fill="#c4a882" opacity="0.40"/>

  <!-- ★ accent label + 兩側裝飾線 + ✦ ★ -->
  <line x1="40" y1="90" x2="72" y2="90" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
  <text x="80" y="95" font-family="'Noto Sans TC', sans-serif"
        font-size="16" fill="#a68b6b" letter-spacing="4" font-weight="600">
    SAVE · 滿額優惠
  </text>
  <line x1="290" y1="90" x2="330" y2="90" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
  <text x="338" y="98" font-family="serif" font-size="10" fill="#a68b6b" opacity="0.7">✦</text>
  <line x1="355" y1="90" x2="430" y2="90" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>

  <!-- 英數大標 - 深棕襯線斜體 -->
  <text x="80" y="170" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="72" fill="#1a1613" font-weight="600" font-style="italic">
    NT$100 OFF
  </text>

  <!-- ★ 三鑽 ornament(細線 + ◆◆◆ + 細線) ★ -->
  <line x1="80" y1="190" x2="180" y2="190" stroke="#1a1613" stroke-width="0.5" opacity="0.5"/>
  <text x="188" y="196" font-family="serif" font-size="11" fill="#1a1613" opacity="0.7">◆</text>
  <text x="204" y="196" font-family="serif" font-size="14" fill="#1a1613" opacity="0.85">◆</text>
  <text x="223" y="196" font-family="serif" font-size="11" fill="#1a1613" opacity="0.7">◆</text>
  <line x1="245" y1="190" x2="450" y2="190" stroke="#1a1613" stroke-width="0.5" opacity="0.5"/>

  <!-- 中文大標 - 深棕粗體 -->
  <text x="80" y="245" font-family="'Noto Sans TC', sans-serif"
        font-size="40" fill="#1a1613" font-weight="700">
    滿千折百
  </text>

  <!-- 副標 -->
  <text x="80" y="277" font-family="'Noto Sans TC', sans-serif"
        font-size="16" fill="#6b5e52">
    全館滿 NT$1,000 享 9 折
  </text>

  <!-- ★ CTA - 右側、深色描線方框(對應 FLASH14 同款式)+ 雙框 + 上下 ✦ 裝飾 ★ -->
  <g transform="translate(960,255)">
    <!-- 上方小裝飾 -->
    <line x1="60" y1="-10" x2="80" y2="-10" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
    <text x="78" y="-6" font-family="serif" font-size="9" fill="#a68b6b" opacity="0.8">✦</text>
    <line x1="92" y1="-10" x2="112" y2="-10" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>

    <rect width="160" height="44" fill="none" stroke="#1a1613" stroke-width="1"/>
    <!-- 內框 -->
    <rect x="3" y="3" width="154" height="38" fill="none" stroke="#1a1613" stroke-width="0.4" opacity="0.5"/>

    <text x="80" y="28" text-anchor="middle"
          font-family="'Noto Sans TC', sans-serif"
          font-size="14" fill="#1a1613" font-weight="500" letter-spacing="2">
      立即領取 →
    </text>

    <!-- 下方小裝飾 -->
    <line x1="60" y1="56" x2="80" y2="56" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
    <text x="78" y="60" font-family="serif" font-size="9" fill="#a68b6b" opacity="0.8">✦</text>
    <line x1="92" y1="56" x2="112" y2="56" stroke="#a68b6b" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- ★ 散落 sparkle 小點(右上空白區) ★ -->
  <g fill="#a68b6b" opacity="0.4">
    <circle cx="600" cy="115" r="1.5"/>
    <circle cx="650" cy="100" r="1"/>
    <circle cx="570" cy="155" r="1.2"/>
    <circle cx="620" cy="170" r="0.8"/>
    <circle cx="530" cy="130" r="1"/>
    <circle cx="700" cy="125" r="1.2"/>
    <circle cx="730" cy="160" r="0.8"/>
  </g>

  <!-- ★ 底部中央 ornament star ★ -->
  <g transform="translate(600,328)" fill="#a68b6b" opacity="0.7">
    <circle r="2"/>
    <circle cx="-15" r="1.2"/>
    <circle cx="15"  r="1.2"/>
    <circle cx="-30" r="0.8" opacity="0.5"/>
    <circle cx="30"  r="0.8" opacity="0.5"/>
  </g>
</svg>
